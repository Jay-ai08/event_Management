<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    @font-face {
        font-family: 'LongaIberica-DEMO';
        src: url('fonts/LongaIberica-DEMO.ttf');
    }

    .btn-gold {
        display: block;
        background: #c2a96b;
        font-family: 'LongaIberica-DEMO';
        font-size: 2.2rem;
        padding-top: 2px;
        padding-bottom: 2px;
        padding-left: 9px;
        padding-right: 9px;
        border: none;
        border-radius: 4px;
    }

    .section-title {
        font-family: 'LongaIberica-DEMO';
        letter-spacing: 2px;
        font-size: 3rem;
    }
</style>

<body>
    <a href="index.html"
        style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: #8d6e63; font-weight: bold;">
        <i class="fa-solid fa-arrow-left"></i> Back to home
    </a>

    <section class="py-5">
        <div class="container my-5">
            <div class=" row g-5">
                <div class="col-md-7">
                    <h2 class="mb-4 section-title">Send a Message</h2>
                    <form>
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Full Name</label>
                            <input id="fullname" type="text" class="form-control border-0 bg-light p-3"
                                placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control border-0 bg-light p-3"
                                placeholder="john.doe@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea id="message" class="form-control border-0 bg-light p-3"
                                placeholder="Your message here..." rows="5"></textarea>
                        </div>
                        <button type="submit" class="btn btn-gold">Send Inquiry</button>
                    </form>
                </div>
                <div class="col-md-5">
                    <div class="bg-dark text-white p-5 rounded-4 h-100">
                        <h3>Contact Info</h3>
                        <p class="mt-4"><i class="bi bi-geo-alt"></i> 123 Event Street, Celebration City</p>
                        <p class="mt-4"><i class="bi bi-telephone"></i> (123) 456-7890</p>
                        <p class="mt-4"><i class="bi bi-envelope"></i> info@eventplanner.com</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
